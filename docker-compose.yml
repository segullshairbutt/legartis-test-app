services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legartis-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app/backend
      - /app/.venv
    networks:
      - legartis-network
    restart: unless-stopped
    command: uv run uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: legartis-web
    ports:
      - "4200:4200"
    environment:
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=1
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.angular
    networks:
      - legartis-network
    depends_on:
      - backend
    restart: unless-stopped
    command: yarn start -- --host 0.0.0.0

networks:
  legartis-network:
    driver: bridge
