<div class="p-6 bg-surface min-h-screen">
  <div class="max-w-6xl mx-auto" *ngIf="contract">
    <!-- Header -->
    <div class="mb-8">
      <p-button label="Back" severity="secondary" (onClick)="goBack()"></p-button>
    </div>

    <!-- Contract Info -->
    <div class="card mb-6">
      <div class="mb-4">
        <h1 class="text-4xl font-bold mb-2">{{ contract.title }}</h1>
        <div class="flex items-center gap-4">
          <span class="text-gray-600">Created: {{ contract.created_at | date: 'short' }}</span>
          <p-tag
            *ngFor="let category of contract.clause_types"
            [value]="category"
            [severity]="getSeverity(category)"
          ></p-tag>
        </div>
      </div>
      <p class="text-gray-700"><strong>Total Clauses:</strong> {{ contract.number_of_clauses }}</p>
    </div>

    <!-- Clauses Table -->
    <div class="card">
      <h2 class="text-2xl font-bold mb-4">Contract Clauses</h2>
      <p-table [value]="clauses" responsiveLayout="scroll">
        <ng-template pTemplate="header">
          <tr>
            <th style="width: 70%">Clause Text</th>
            <th style="width: 20%">Type</th>
            <th style="width: 10%">Action</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-clause>
          <tr>
            <td>{{ clause.text }}</td>
            <td>
              <p-tag [value]="clause.type" [severity]="getSeverity(clause.type)"></p-tag>
            </td>
            <td>
              <p-button
                label="Edit"
                severity="info"
                size="small"
                (onClick)="editClause(clause)"
              ></p-button>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="2" class="text-center py-8">No clauses found</td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>

  <div class="text-center py-12" *ngIf="!contract">
    <p class="text-gray-500">Loading contract details...</p>
  </div>
</div>

<edit-clause-dialog
  [(isOpen)]="isClauseDialogOpen"
  [clause]="selectedClause!"
  (saved)="onClauseSaved($event)"
></edit-clause-dialog>
