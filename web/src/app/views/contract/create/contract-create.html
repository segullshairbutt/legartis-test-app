<div class="flex justify-center pt-5 bg-surface">
  <form
    [formGroup]="contractForm"
    (ngSubmit)="onSubmit()"
    (reset)="resetForm()"
    class="w-full max-w-[500px]"
  >
    <div class="card">
      <p *ngIf="successMessage" class="mb-4 px-3 py-2 rounded bg-green-100 text-green-800 text-sm">
        {{ successMessage }}
      </p>
      <div class="card-header mb-6 text-center">
        <h2 class="text-2xl font-semibold">Create Contract</h2>
      </div>

      <div class="space-y-4 mb-8">
        <div>
          <label class="block text-sm font-medium mb-2">Title</label>
          <input pInputText formControlName="title" placeholder="Enter title" class="w-full" />
          <small
            class="text-red-500"
            *ngIf="contractForm.get('title')?.invalid && contractForm.get('title')?.touched"
          >
            <span *ngIf="contractForm.get('title')?.errors?.['required']">Title is required</span>
          </small>
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">File</label>
          <input
            type="file"
            formControlName="file"
            accept=".txt,.md"
            class="w-full"
            (change)="onFileChange($event)"
          />
          <small
            class="text-red-500"
            *ngIf="contractForm.get('file')?.invalid && contractForm.get('file')?.touched"
          >
            <span *ngIf="contractForm.get('file')?.errors?.['required']">File is required</span>
          </small>
        </div>
      </div>

      <div class="flex gap-3 justify-end">
        <p-button
          label="Reset"
          severity="secondary"
          type="reset"
          [disabled]="isSubmitting"
        ></p-button>
        <p-button
          label="Submit"
          severity="success"
          type="submit"
          [disabled]="contractForm.invalid || isSubmitting"
        ></p-button>
      </div>
    </div>
  </form>
</div>
