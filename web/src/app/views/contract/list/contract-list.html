<div class="p-6 bg-surface">
  <div class="max-w-7xl mx-auto">
    <h1 class="text-3xl font-bold mb-6 text-center">Contracts</h1>
    <div class="card">
      <p-table
        [value]="contracts || []"
        [lazy]="true"
        (onLazyLoad)="onLazyLoad($event)"
        responsiveLayout="scroll"
        stripedRows
        [sortField]="'created_at'"
        [sortOrder]="-1"
        [loading]="loading"
      >
        <ng-template #caption>
          <div class="flex gap-4">
            <p-columnFilter field="category" [showMenu]="false">
              <ng-template #filter>
                <p-multiselect
                  [(ngModel)]="selectedCategories"
                  [options]="categoryOptions"
                  placeholder="Filter by category"
                  (onChange)="filterByCategory()"
                  style="min-width: 14rem"
                  [panelStyle]="{ minWidth: '16rem' }"
                >
                  <ng-template let-option #item>
                    <div class="flex items-center gap-2">
                      <p-tag [value]="option" [severity]="getSeverity(option)"></p-tag>
                    </div>
                  </ng-template>
                </p-multiselect>
              </ng-template>
            </p-columnFilter>
            <p-iconfield iconPosition="left" class="ml-auto">
              <input
                pInputText
                type="text"
                (input)="searchContracts($event)"
                placeholder="Search contracts"
              />
            </p-iconfield>
          </div>
        </ng-template>
        <ng-template pTemplate="header">
          <tr>
            <th pSortableColumn="name">
              <div class="flex items-center gap-2">
                Title
                <p-sortIcon field="name" />
              </div>
            </th>
            <th>Clauses</th>
            <th pSortableColumn="created_at">
              <div class="flex items-center gap-2">
                Created At
                <p-sortIcon field="created_at" />
              </div>
            </th>
            <th>Action</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-contract>
          <tr>
            <td>
              {{ contract.name }}
              <div class="mt-1">
                <p-tag *ngFor="let category of contract.clause_types" [value]="category"></p-tag>
              </div>
            </td>
            <td>{{ contract.number_of_clauses }}</td>
            <td>{{ contract.created_at | date: 'short' }}</td>
            <td>
              <p-button
                label="View"
                severity="info"
                size="small"
                (onClick)="viewDetail(contract.id)"
              ></p-button>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="5" class="text-center py-8">No contracts found</td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>
</div>
